name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  wheel:
    runs-on: ubuntu-latest
    container: python:3.11-slim-trixie
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - run: pip install hatch
      - run: hatch build
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  windows:
    runs-on: windows-latest
    needs: wheel
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller pillow .
      - run: pyinstaller minifluxsearch-gui.spec
      - run: pyinstaller minifluxsearch.spec
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/minifluxsearch-gui.exe
            dist/minifluxsearch.exe
