name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    container: python:3.11-slim-trixie
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - run: pip install hatch
      - run: hatch build
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
